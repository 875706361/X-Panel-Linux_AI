{{define "component/sidebar/content"}}
<template>
    <div class="ant-sidebar">
        <a-layout-sider :theme="themeSwitcher.currentTheme" collapsible :collapsed="collapsed"
            @collapse="(isCollapsed, type) => collapseHandle(isCollapsed, type)" breakpoint="md" width="200">
            
            <div class="sider-flex-wrapper">
                
                <div class="sider-top">
                    <a-theme-switch></a-theme-switch>
                </div>

                <div class="sider-menu-container">
                    <a-menu :theme="themeSwitcher.currentTheme" mode="inline" :selected-keys="activeTab"
                        @click="({key}) => openLink(key)">
                        <a-menu-item v-for="tab in tabs" :key="tab.key">
                            <a-icon :type="tab.icon"></a-icon>
                            <span v-text="tab.title"></span>
                        </a-menu-item>
                    </a-menu>
                </div>

                <div class="sidebar-copyright-wrapper" v-show="!collapsed">
                    <div class="copyright-content">
                        <div class="brand-row">
                            <a-icon type="safety-certificate" theme="filled" class="brand-icon"></a-icon>
                            <span class="brand-name">X-Panel</span>
                        </div>
                        <div class="year-row">
                            <span>Copyright <a-icon type="copyright"></a-icon> 2022-2026</span>
                        </div>
                    </div>
                </div>

            </div>
        </a-layout-sider>

        <a-drawer placement="left" :closable="false" @close="closeDrawer" :visible="visible"
            :wrap-class-name="themeSwitcher.currentTheme" :wrap-style="{ padding: 0 }" :style="{ height: '100%' }">
            <div class="drawer-handle" @click="toggleDrawer" slot="handle">
                <a-icon :type="visible ? 'close' : 'menu-fold'"></a-icon>
            </div>
            <a-theme-switch></a-theme-switch>
            <a-menu :theme="themeSwitcher.currentTheme" mode="inline" :selected-keys="activeTab"
                @click="({key}) => openLink(key)">
                <a-menu-item v-for="tab in tabs" :key="tab.key">
                    <a-icon :type="tab.icon"></a-icon>
                    <span v-text="tab.title"></span>
                </a-menu-item>
            </a-menu>
        </a-drawer>
    </div>
</template>
{{end}}

{{define "component/aSidebar"}}
<style>
    /* 1. 基础高度设置 */
    .ant-sidebar, .ant-sidebar > .ant-layout-sider {
        height: 100%;
    }

    /* [布局容器] */
    .sider-flex-wrapper {
        display: flex;
        flex-direction: column; /* 从上到下排列 */
        height: 100%;
        overflow: hidden; 
    }

    /* [菜单容器] */
    .sider-menu-container {
        /* [修改说明]：删除了 flex: 1。菜单高度现在由内容决定，不会自动撑满 */
        /* 添加 flex-shrink: 1 只是为了防止屏幕特别矮时菜单被切断，让它能出滚动条 */
        flex-shrink: 1; 
        overflow-y: auto;
        overflow-x: hidden;
    }
    
    .sider-menu-container .ant-menu {
        border-right: none; 
    }

    /* 2. 版权区域 */
    .sidebar-copyright-wrapper {
        /* [核心修改]：margin-top: auto 是关键 */
        /* 它的作用是：自动占据上方所有的空白空间，从而把自己推到容器的最底部 */
        margin-top: auto; 
        
        flex-shrink: 0;
        width: 100%;
        padding: 15px 0 20px 0;
        text-align: center;
        background: inherit;
        /* [已删除] border-top: ... (那条横线已经彻底删除了) */
    }

    /* 3. 品牌行样式 */
    .brand-row {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px; 
        font-weight: 600;
        margin-bottom: 4px;
        opacity: 0.85; 
        letter-spacing: 0.5px;
    }

    .brand-icon {
        margin-right: 6px;
        font-size: 15px;
        opacity: 0.8;
    }

    /* 4. 年份版权行样式 */
    .year-row {
        font-size: 11px;
        opacity: 0.45; 
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .year-row .anticon-copyright {
        font-size: 10px;
        margin: 0 3px;
        position: relative;
    }
    
    /* 滚动条样式美化 */
    .sider-menu-container::-webkit-scrollbar {
        width: 4px;
    }
    .sider-menu-container::-webkit-scrollbar-thumb {
        background: rgba(128, 128, 128, 0.2);
        border-radius: 2px;
    }
    .sider-menu-container::-webkit-scrollbar-track {
        background: transparent;
    }

    /* ========== 主题切换下拉菜单样式 ========== */
    .sider-top {
        padding: 8px 16px 16px;
    }

    .theme-dropdown-wrapper {
        position: relative;
    }

    /* 触发按钮 */
    .theme-dropdown-trigger {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        background: #fff;
        border: 1px solid #e8e8e8;
        transition: all 0.2s ease;
        user-select: none;
    }

    .theme-dropdown-trigger:hover {
        background: #fafafa;
        border-color: #d9d9d9;
    }

    .theme-dropdown-trigger.is-open {
        border-color: #1890ff;
        background: #e6f7ff;
    }

    /* 暗色模式触发按钮 */
    .dark .theme-dropdown-trigger,
    .black .theme-dropdown-trigger {
        background: #1f1f1f;
        border-color: #434343;
    }

    .dark .theme-dropdown-trigger:hover,
    .black .theme-dropdown-trigger:hover {
        background: #2a2a2a;
        border-color: #555;
    }

    .dark .theme-dropdown-trigger.is-open,
    .black .theme-dropdown-trigger.is-open {
        border-color: #1890ff;
        background: #111b26;
    }

    /* 灯泡图标 */
    .theme-icon-bulb {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .theme-icon-bulb svg {
        display: block;
    }

    /* 主题文字 */
    .theme-text {
        flex: 1;
        font-size: 14px;
        color: #333;
        font-weight: 500;
    }

    .dark .theme-text,
    .black .theme-text {
        color: #fff;
    }

    /* 箭头 */
    .theme-arrow {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #999;
        transition: transform 0.2s ease;
    }

    .theme-arrow.is-up {
        transform: rotate(180deg);
    }

    /* 下拉菜单 */
    .theme-dropdown-menu {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        margin-top: 4px;
        padding: 4px;
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.2s ease;
        z-index: 100;
    }

    .theme-dropdown-menu.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    /* 暗色模式下拉菜单 */
    .dark .theme-dropdown-menu,
    .black .theme-dropdown-menu {
        background: #1f1f1f;
        border-color: #434343;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
    }

    /* 选项项 */
    .theme-option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s ease;
    }

    .theme-option:hover {
        background: #f5f5f5;
    }

    .theme-option.active {
        background: #e6f7ff;
    }

    /* 暗色模式选项 */
    .dark .theme-option:hover,
    .black .theme-option:hover {
        background: #2a2a2a;
    }

    .dark .theme-option.active,
    .black .theme-option.active {
        background: #111b26;
    }

    /* 选项图标 */
    .option-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
    }

    .option-icon.light {
        color: #ff8c00;
    }

    .option-icon.dark {
        color: #7c8ba8;
    }

    /* 选项文字 */
    .option-text {
        flex: 1;
        font-size: 13px;
        color: #333;
    }

    .dark .option-text,
    .black .option-text {
        color: #ddd;
    }

    /* 选中标记 */
    .option-check {
        font-size: 14px;
        font-weight: bold;
        color: #1890ff;
    }
</style>

<script>
    const SIDEBAR_COLLAPSED_KEY = "isSidebarCollapsed"

    Vue.component('a-sidebar', {
        data() {
            return {
                tabs: [
                    {
                        key: '{{ .base_path }}panel/',
                        icon: 'dashboard',
                        title: '{{ i18n "menu.dashboard"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/inbounds',
                        icon: 'user',
                        title: '{{ i18n "menu.inbounds"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/settings',
                        icon: 'setting',
                        title: '{{ i18n "menu.settings"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/xray',
                        icon: 'tool',
                        title: '{{ i18n "menu.xray"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/servers',
                        icon: 'cloud-server', 
                        title: '{{ i18n "pages.controlledmanagement.title"}}'
                    },

                    {
                        key: '{{ .base_path }}logout/',
                        icon: 'logout',
                        title: '{{ i18n "menu.logout"}}'
                    },
                ],
                activeTab: [
                    '{{ .request_uri }}'
                ],
                visible: false,
                collapsed: JSON.parse(localStorage.getItem(SIDEBAR_COLLAPSED_KEY)),
            }
        },
        methods: {
            openLink(key) {
                return key.startsWith('http') ? 
                    window.open(key) : 
                    location.href = key
            },
            closeDrawer() {
                this.visible = false;
            },
            toggleDrawer() {
                this.visible = !this.visible;
            },
            collapseHandle(collapsed, type) {
                if (type === "clickTrigger") {
                    localStorage.setItem(SIDEBAR_COLLAPSED_KEY, collapsed);

                    this.collapsed = JSON.parse(localStorage.getItem(SIDEBAR_COLLAPSED_KEY));
                }
            }
        },
        template: `{{template "component/sidebar/content"}}`,
    });
</script>
{{end}}
